services:
  composer:
    build:
      context: .
      dockerfile: docker/composer/composer.dockerfile
    user: "${UID}:${GID}"
    volumes:
      - ./:/var/www/html
    working_dir: /var/www/html
  php:
    build:
      context: .
      dockerfile: docker/php/php.dockerfile
    user: "${UID}:${GID}"
    env_file:
      - .env

    volumes:
      - ./:/var/www/html
      - ./docker/php/php-overrides.ini:/usr/local/etc/php/conf.d/php-overrides.ini

    networks:
      - laravel
      # - ufamasters_laravel

  nginx:
    image: nginx:1.25-alpine
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - laravel
      # - ufamasters_laravel

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.archivarius.rule=Host(`archivarius.ufamasters.ru`)"
      - "traefik.http.routers.archivarius.entrypoints=websecure"
      - "traefik.http.routers.archivarius.tls.certresolver=myresolver"

      - "traefik.http.routers.archivarius-insecure.rule=Host(`archivarius.ufamasters.ru`)"
      - "traefik.http.routers.archivarius-insecure.entrypoints=web"
      - "traefik.http.routers.archivarius-insecure.middlewares=redirect-to-https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"

  mysql:
    image: mysql:8.0.38-debian
    environment:
      MYSQL_DATABASE: "${DB_DATABASE}"
      MYSQL_USER: "${DB_USERNAME}"
      MYSQL_PASSWORD: "${DB_PASSWORD}"
      MYSQL_ROOT_PASSWORD: "${DB_PASSWORD}"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - laravel
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h localhost -u$$MYSQL_USER -p$$MYSQL_PASSWORD || exit 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 15s

  redis:
    image: redis:7-alpine
    networks:
      - laravel

  worker:
    build:
      context: .
      dockerfile: docker/php/php.dockerfile
    env_file:
      - .env
    volumes:
      - ./:/var/www/html
    networks:
      - laravel
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    # Wait for DB, then process queues (vk.scan needs long Playwright timeout)
    # Note: do not use `db:show` here — it may fail without php-intl even when DB is up.
    command: >
      sh -c "
        echo 'worker: waiting for database...';
        until php artisan migrate:status >/dev/null 2>&1; do sleep 2; done;
        echo 'worker: starting queue:work';
        php artisan queue:work $${QUEUE_CONNECTION:-database}
          --queue=vk.scan,telegram.webhook,broadcast.telegram,default
          --tries=2
          --timeout=300
          --sleep=1
          -vvv
      "

  scheduler:
    build:
      context: .
      dockerfile: docker/php/php.dockerfile
    env_file:
      - .env
    volumes:
      - ./:/var/www/html
    networks:
      - laravel
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    command: >
      sh -c "
        echo 'scheduler: waiting for database...';
        until php artisan migrate:status >/dev/null 2>&1; do sleep 2; done;
        echo 'scheduler: starting schedule:work';
        php artisan schedule:work --verbose
      "

  parser:
    image: mcr.microsoft.com/playwright:v1.61.0-jammy
    user: "${UID}:${GID}"
    working_dir: /app
    ports:
    - "3000:3000"
    volumes:
    - ./parser:/app

    networks:
    - laravel

    command: node src/index.js

volumes:
  db_data:

networks:
  # ufamasters_laravel:
  #   external: true # сеть первого окружения
  laravel:
    driver: bridge
